title: 고세오름
---
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>고세오름 — 새 홈페이지로 이동합니다</title>
  <meta name="description" content="고려대 연세대 등산모임 고세오름 Korea Yonsei Hiking Club">
  <meta http-equiv="refresh" content="5; url=https://koseioreum.pages.dev">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky-top: #0a0f1e;
      --sky-mid: #1a2a4a;
      --sky-bottom: #2d4a7a;
      --accent: #7eb8f7;
      --accent-bright: #a8d4ff;
      --snow: #e8f4fd;
      --text: #d8eaff;
      --text-dim: #8aadcc;
    }

    html, body {
      height: 100%;
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--sky-top);
      color: var(--text);
      overflow: hidden;
    }

    /* ── 밤하늘 별 ── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d, 3s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: var(--op, 0.7); }
    }

    /* ── 산 레이어 ── */
    .mountain-scene {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 55%;
      pointer-events: none;
      z-index: 1;
    }

    /* ── 메인 콘텐츠 ── */
    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .logo-wrap {
      margin-bottom: 1.5rem;
      animation: fadeDown 0.8s ease both;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 0.75rem;
      filter: drop-shadow(0 0 18px rgba(126,184,247,0.5));
    }

    .title {
      font-size: clamp(2.2rem, 8vw, 3.5rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent-bright) 0%, var(--accent) 60%, #5b9bd5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      animation: fadeDown 0.8s 0.1s ease both;
    }

    .subtitle {
      margin-top: 0.4rem;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      animation: fadeDown 0.8s 0.2s ease both;
    }

    /* ── 카드 ── */
    .card {
      margin-top: 2.5rem;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(126,184,247,0.15);
      border-radius: 20px;
      padding: 2rem 2.5rem;
      max-width: 480px;
      width: 100%;
      animation: fadeUp 0.9s 0.4s ease both;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .card-msg {
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.7;
    }

    .card-msg strong {
      color: var(--accent-bright);
      font-weight: 700;
    }

    /* ── 카운트다운 ── */
    .countdown-wrap {
      margin: 1.8rem 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .countdown-ring {
      position: relative;
      width: 76px;
      height: 76px;
      flex-shrink: 0;
    }

    .countdown-ring svg {
      transform: rotate(-90deg);
      width: 76px;
      height: 76px;
    }

    .countdown-ring .track {
      fill: none;
      stroke: rgba(126,184,247,0.15);
      stroke-width: 5;
    }

    .countdown-ring .progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 207;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
      filter: drop-shadow(0 0 6px var(--accent));
    }

    .countdown-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent-bright);
    }

    .countdown-label {
      font-size: 0.95rem;
      color: var(--text-dim);
      line-height: 1.5;
      text-align: left;
    }

    /* ── 버튼 ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.8rem;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, var(--accent) 0%, #5b9bd5 100%);
      color: #0a0f1e;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 20px rgba(126,184,247,0.35);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(126,184,247,0.5);
      opacity: 0.92;
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    .new-url {
      margin-top: 1rem;
      font-size: 0.78rem;
      color: var(--text-dim);
      opacity: 0.7;
    }

    /* ── 애니메이션 ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- 별 배경 -->
  <div class="stars" id="stars"></div>

  <!-- 산 실루엣 -->
  <svg class="mountain-scene" viewBox="0 0 1440 400" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#0a0f1e"/>
        <stop offset="100%" stop-color="#1a2a4a"/>
      </linearGradient>
      <linearGradient id="mtn1" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2a3d5c"/>
        <stop offset="100%" stop-color="#111827"/>
      </linearGradient>
      <linearGradient id="mtn2" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1e2e45"/>
        <stop offset="100%" stop-color="#0d1520"/>
      </linearGradient>
      <linearGradient id="mtn3" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#131e30"/>
        <stop offset="100%" stop-color="#090d14"/>
      </linearGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- 뒷산 -->
    <polygon fill="url(#mtn3)" points="0,400 0,280 120,180 280,260 420,100 580,230 720,80 880,200 1020,130 1160,220 1300,150 1440,240 1440,400"/>

    <!-- 중간 산 -->
    <polygon fill="url(#mtn2)" points="0,400 0,320 200,240 350,280 500,160 660,270 800,140 960,250 1100,180 1260,260 1440,200 1440,400"/>

    <!-- 앞산 -->
    <polygon fill="url(#mtn1)" points="0,400 0,360 180,300 300,330 460,210 600,310 740,220 900,300 1050,240 1200,310 1360,260 1440,300 1440,400"/>

    <!-- 설산 하이라이트 -->
    <polygon fill="rgba(232,244,253,0.18)" filter="url(#glow)"
             points="420,100 400,130 440,120 460,140 500,160 480,175 440,155 400,170 380,145 400,118"/>
    <polygon fill="rgba(232,244,253,0.12)" filter="url(#glow)"
             points="720,80 700,108 735,100 755,118 800,140 778,155 740,138 700,152 682,128 700,100"/>
    <polygon fill="rgba(232,244,253,0.10)"
             points="1020,130 1004,155 1035,148 1050,162 1080,178 1063,188 1040,175 1010,185 995,163 1010,140"/>

    <!-- 달 -->
    <circle cx="1300" cy="80" r="28" fill="rgba(232,244,253,0.90)" filter="url(#glow)"/>
    <circle cx="1310" cy="72" r="22" fill="#0a0f1e"/>
    <circle cx="1300" cy="80" r="28" fill="rgba(232,244,253,0.12)"/>
  </svg>

  <!-- 메인 콘텐츠 -->
  <div class="container">
    <div class="logo-wrap">
      <!-- 산 아이콘 -->
      <svg class="logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="32,6 56,52 8,52" fill="rgba(126,184,247,0.15)" stroke="#7eb8f7" stroke-width="2" stroke-linejoin="round"/>
        <polygon points="32,6 44,30 38,30 44,52 20,52 26,30 20,30" fill="none" stroke="#7eb8f7" stroke-width="1.5" stroke-linejoin="round" opacity="0.4"/>
        <!-- 설산 -->
        <polygon points="32,6 26,18 38,18" fill="rgba(232,244,253,0.7)"/>
      </svg>
      <h1 class="title">고세오름</h1>
      <p class="subtitle">Korea &amp; Yonsei Hiking Club</p>
    </div>

    <div class="card">
      <p class="card-msg">
        홈페이지가 <strong>새로운 주소</strong>로 이사했습니다.<br>
        잠시 후 자동으로 이동합니다.
      </p>

      <div class="countdown-wrap">
        <div class="countdown-ring">
          <svg viewBox="0 0 76 76">
            <circle class="track" cx="38" cy="38" r="33"/>
            <circle class="progress" id="ring" cx="38" cy="38" r="33"/>
          </svg>
          <span class="countdown-num" id="num">5</span>
        </div>
        <div class="countdown-label">
          <span id="msg">5초 후 자동으로<br>이동합니다</span>
        </div>
      </div>

      <a href="https://koseioreum.pages.dev" class="btn" id="goBtn">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 8a.5.5 0 0 1 .5-.5h7.793L8.146 4.354a.5.5 0 1 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L11.293 8.5H3.5A.5.5 0 0 1 3 8z"/></svg>
        지금 바로 이동하기
      </a>
      <p class="new-url">koseioreum.pages.dev</p>
    </div>
  </div>

  <script>
    // 별 생성
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2.5 + 0.5;
      s.style.cssText = `
        left:${Math.random()*100}%;
        top:${Math.random()*65}%;
        width:${size}px;
        height:${size}px;
        --d:${(Math.random()*4+2).toFixed(1)}s;
        --delay:${(Math.random()*5).toFixed(1)}s;
        --op:${(Math.random()*0.5+0.3).toFixed(2)};
      `;
      starsEl.appendChild(s);
    }

    // 카운트다운
    const TOTAL = 5;
    const ring = document.getElementById('ring');
    const numEl = document.getElementById('num');
    const msgEl = document.getElementById('msg');
    const CIRCUM = 2 * Math.PI * 33; // ≈ 207.3

    ring.style.strokeDasharray = CIRCUM;
    ring.style.strokeDashoffset = 0;

    let remaining = TOTAL;

    function tick() {
      remaining--;
      const offset = CIRCUM * (1 - remaining / TOTAL);
      ring.style.strokeDashoffset = offset;
      numEl.textContent = remaining;

      if (remaining <= 0) {
        msgEl.innerHTML = '이동 중...';
        numEl.textContent = '';
        ring.style.stroke = '#a8d4ff';
        window.location.href = 'https://koseioreum.pages.dev';
      } else {
        msgEl.innerHTML = `${remaining}초 후 자동으로<br>이동합니다`;
      }
    }

    // 1초 후 첫 tick, 이후 매초
    let timer = setInterval(tick, 1000);

    // 버튼 클릭 시 타이머 취소
    document.getElementById('goBtn').addEventListener('click', () => clearInterval(timer));
  </script>

</body>
</html>
